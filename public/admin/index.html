<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Editor · Hotel Casa Mónica</title>
  <link rel="icon" href="/casa-monica-logo.png" />
  <style>
    body {
      margin: 0;
      background: #FDF6E8;
      font-family: Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #3D2817;
    }
    .loader {
      text-align: center;
    }
    .loader img {
      width: 80px;
      height: 80px;
      margin-bottom: 16px;
      animation: pulse 2s ease-in-out infinite;
    }
    .loader h1 {
      font-size: 24px;
      color: #C8542A;
      margin: 0 0 8px;
    }
    .loader p {
      color: #7A5A35;
      font-size: 14px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(0.95); }
    }
  </style>
</head>
<body>
  <div class="loader">
    <img src="/casa-monica-logo.png" alt="Casa Mónica" />
    <h1>Cargando editor…</h1>
    <p>Hotel Casa Mónica · Mompox</p>
  </div>

  <!-- Decap CMS configuration — embedded inline to avoid routing issues -->
  <script>
    window.CMS_CONFIG = {
      backend: {
        name: 'git-gateway',
        branch: 'main'
      },
      media_folder: 'public',
      public_folder: '',
      publish_mode: 'editorial_workflow',
      show_preview_links: false,
      collections: [
        {
          name: 'site_content',
          label: 'Contenido del sitio',
          description: 'Textos principales del sitio — portada, nosotros, contacto',
          delete: false,
          editor: { preview: false },
          files: [
            {
              file: 'content/hero.json',
              name: 'hero',
              label: 'Portada (Hero)',
              fields: [
                { label: 'Título (parte 1)', name: 'title1', widget: 'string', hint: 'Ej: "Siéntete como"' },
                { label: 'Título (parte 2, script)', name: 'title2', widget: 'string', hint: 'Ej: "en casa"' },
                { label: 'Subtítulo', name: 'subtitle', widget: 'text' },
                { label: 'Botón de reserva', name: 'cta_book', widget: 'string' },
                { label: 'Botón explorar', name: 'cta_explore', widget: 'string' }
              ]
            },
            {
              file: 'content/about.json',
              name: 'about',
              label: 'Nosotros',
              fields: [
                { label: 'Título', name: 'title', widget: 'string' },
                { label: 'Párrafo 1', name: 'p1', widget: 'text' },
                { label: 'Párrafo 2', name: 'p2', widget: 'text' },
                { label: 'Párrafo 3', name: 'p3', widget: 'text' }
              ]
            },
            {
              file: 'content/fredy.json',
              name: 'fredy',
              label: 'Sr Fredy',
              fields: [
                { label: 'Nombre', name: 'name', widget: 'string' },
                { label: 'Rol', name: 'role', widget: 'string' },
                { label: 'Frase', name: 'tagline', widget: 'string' },
                { label: 'Biografía', name: 'bio', widget: 'text' },
                { label: 'Foto', name: 'photo', widget: 'image' }
              ]
            },
            {
              file: 'content/monica.json',
              name: 'monica',
              label: 'Sra Mónica',
              fields: [
                { label: 'Nombre', name: 'name', widget: 'string' },
                { label: 'Rol', name: 'role', widget: 'string' },
                { label: 'Frase', name: 'tagline', widget: 'string' },
                { label: 'Biografía', name: 'bio', widget: 'text' },
                { label: 'Foto', name: 'photo', widget: 'image' }
              ]
            },
            {
              file: 'content/contact.json',
              name: 'contact',
              label: 'Contacto',
              fields: [
                { label: 'WhatsApp', name: 'whatsapp', widget: 'string', hint: 'Ej: +57 300 310 0299' },
                { label: 'Instagram', name: 'instagram', widget: 'string' },
                { label: 'Dirección', name: 'address', widget: 'string' }
              ]
            }
          ]
        },
        {
          name: 'reviews',
          label: 'Opiniones',
          label_singular: 'Opinión',
          folder: 'content/reviews',
          create: true,
          delete: true,
          slug: '{{slug}}-{{year}}{{month}}{{day}}',
          summary: '{{author}} — {{rating}}★',
          editor: { preview: false },
          fields: [
            { label: 'Texto', name: 'text', widget: 'text' },
            { label: 'Autor', name: 'author', widget: 'string' },
            { label: 'Calificación', name: 'rating', widget: 'number', min: 1, max: 5, default: 5 },
            { label: 'Fecha', name: 'date', widget: 'datetime' }
          ]
        },
        {
          name: 'festivals',
          label: 'Festivales',
          label_singular: 'Festival',
          folder: 'content/festivals',
          create: true,
          delete: true,
          slug: '{{slug}}',
          summary: '{{name}} — {{date}}',
          editor: { preview: false },
          fields: [
            { label: 'Nombre', name: 'name', widget: 'string' },
            { label: 'Fecha', name: 'date', widget: 'string', hint: 'Ej: "19-21 de Julio"' },
            { label: 'Descripción', name: 'description', widget: 'text' },
            { label: 'Reservar con tiempo', name: 'bookAhead', widget: 'boolean', default: false },
            { label: 'Emoji', name: 'icon', widget: 'string', hint: 'Un emoji, ej: 🎵' }
          ]
        }
      ]
    };
  </script>

  <!-- Netlify Identity widget — required for git-gateway auth -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@3.4.0/dist/decap-cms.js"></script>
  <script>
    // Redirect to /admin after login
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
